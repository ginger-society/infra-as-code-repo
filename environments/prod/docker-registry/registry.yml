apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: registry-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: registry
  template:
    metadata:
      labels:
        app: registry
    spec:
      containers:
        - name: registry
          image: registry:2
          env:
            - name: REGISTRY_HTTP_SECRET
              value: ""
            - name: REGISTRY_STORAGE_DELETE_ENABLED
              value: "true"
            - name: REGISTRY_HTTP_ADDR
              value: "0.0.0.0:5000"

            # Token auth replacing htpasswd
            - name: REGISTRY_AUTH
              value: "token"
            - name: REGISTRY_AUTH_TOKEN_REALM
              value: "https://api.gingersociety.org/iam/docker-token"
            - name: REGISTRY_AUTH_TOKEN_SERVICE
              value: "docker.gingersociety.org"
            - name: REGISTRY_AUTH_TOKEN_ISSUER
              value: "my-auth-server"
            - name: REGISTRY_AUTH_TOKEN_ROOTCERTBUNDLE
              value: "/certs/auth.cert"

          ports:
            - containerPort: 5000
          volumeMounts:
            - mountPath: /var/lib/registry
              name: registry-storage
            - mountPath: /certs
              name: cert-volume

      volumes:
        - name: registry-storage
          persistentVolumeClaim:
            claimName: registry-pvc
        - name: cert-volume
          secret:
            secretName: registry-auth-secret
---
apiVersion: v1
kind: Service
metadata:
  name: registry
spec:
  selector:
    app: registry
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
  type: NodePort