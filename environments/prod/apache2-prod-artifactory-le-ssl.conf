<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName docker.gingersociety.org
    ProxyPreserveHost On

    # Disable request buffering — critical for large image uploads
    SetEnv proxy-sendchunked 1
    SetEnv proxy-sendchunks 1

    # No size limit for docker image uploads
    LimitRequestBody 0

    # Increase timeouts for large layer uploads
    ProxyTimeout 3600
    Timeout 3600

    # Disable proxy buffering so chunks stream directly through
    SetEnv proxy-nokeepalive 1
    SetEnv force-proxy-request-1.0 0

    <Proxy *>
        Order allow,deny
        Allow from all
    </Proxy>

    ProxyPass / http://0.0.0.0:5000/
    ProxyPassReverse / http://0.0.0.0:5000/

    ErrorLog ${APACHE_LOG_DIR}/gingersociety/containers_error.log
    CustomLog ${APACHE_LOG_DIR}/gingersociety/containers_access.log combined
    SSLCertificateFile /etc/letsencrypt/live/npm.gingersociety.org/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/npm.gingersociety.org/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>

