apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service-deployment
  labels:
    app: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: gingersociety/notification-service-stage:latest
          ports:
            - containerPort: 3030

          env:
            # ✅ AMQP from RabbitMQ Helm secret
            - name: AMPQ_URI
              valueFrom:
                secretKeyRef:
                  name: my-rabbitmq-rabbitmq-auth
                  key: amqp_url

            # ✅ AWS creds from SES secret
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: ses-credentials
                  key: AWS_ACCESS_KEY_ID

            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: ses-credentials
                  key: AWS_SECRET_ACCESS_KEY

            - name: AWS_REGION
              value: "ap-south-1"