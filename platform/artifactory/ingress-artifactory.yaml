apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: artifactory-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/enable-websocket: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
spec:
  ingressClassName: nginx
  rules:
    - host: npm.{{HOSTING_FQDN}}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: verdaccio-service
                port:
                  number: 80

    - host: docker-ui.{{HOSTING_FQDN}}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: registry-ui
                port:
                  number: 80

    - host: pip.{{HOSTING_FQDN}}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pypiserver
                port:
                  number: 80
