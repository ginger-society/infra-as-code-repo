# deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ginger-gitter
  labels:
    app: ginger-gitter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ginger-gitter
  template:
    metadata:
      annotations:
        x-ginger-code-ejectable: "ginger-gitter-service"
      labels:
        app: ginger-gitter
    spec:
      containers:
        - name: gitolite
          image: gingersociety/gitter:latest
          ports:
            - containerPort: 22
          volumeMounts:
            - name: gitolite-data
              mountPath: /home/git
            - name: admin-key
              mountPath: /run/secrets/admin_key.pub
              subPath: admin_key.pub
              readOnly: true

        - name: ginger-gitter-service
          image: gingersociety/ginger-gitter-service:latest
          ports:
            - containerPort: 8080
          imagePullPolicy: Always
          env:
            - name: REDIS_URL
              value: "redis://redis-service:6379"
            - name: AMPQ_URI
              valueFrom:
                secretKeyRef:
                  name: my-rabbitmq-rabbitmq-auth
                  key: amqp_url
            - name: ADMIN_REPO_SSH_URL
              value: "git@localhost:gitolite-admin.git"
            - name: ADMIN_SSH_KEY_PATH
              value: "/run/secrets/admin_key"
            - name: GH_SSH_PREFIX
              valueFrom:
                configMapKeyRef:
                  name: ginger-gitter-config
                  key: GH_SSH_PREFIX
            - name: GH_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: ginger-gitter-config
                  key: GH_USERNAME
            - name: GH_PAT
              valueFrom:
                secretKeyRef:
                  name: gitolite-admin-key
                  key: gh_pat
            - name: GH_SSH_KEY_PATH
              value: "/run/secrets/gh_ssh_key"
            - name: ADMIN_REPO_PATH
              value: "./admin-repo"
            - name: GITOLITE_PORT
              value: "22"
            - name: GITOLITE_HOST
              value: "localhost"
            - name: RUST_LOG
              value: "debug"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: JWT_SECRET
          volumeMounts:
            - name: admin-key
              mountPath: /run/secrets/admin_key
              subPath: admin_key
              readOnly: true
            - name: admin-key
              mountPath: /run/secrets/gh_ssh_key
              subPath: gh_ssh_key
              readOnly: true
            - name: gitolite-data
              mountPath: /home/git


      volumes:
        - name: gitolite-data
          persistentVolumeClaim:
            claimName: gitolite-pvc
        - name: admin-key
          secret:
            secretName: gitolite-admin-key
            items:
              - key: admin_key.pub
                path: admin_key.pub
                mode: 0444        # readable by git user for gitolite setup
              - key: admin_key
                path: admin_key
                mode: 0400        # private key — SSH requires this
              - key: gh_ssh_key
                path: gh_ssh_key
                mode: 0400        # private key — SSH requires this
              - key: gh_pat
                path: gh_pat
                mode: 0400