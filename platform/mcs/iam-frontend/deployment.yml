apiVersion: apps/v1
kind: Deployment
metadata:
  name: iam-frontend-deploy
  labels:
    app: iam-frontend-app
spec:
  selector:
    matchLabels:
      app: iam-frontend-app
  replicas: 1
  template:
    metadata:
      labels:
        app: iam-frontend-app
    spec:
      containers:
      - name: iam-frontend-app
        image: gingersociety/iam-prod-fe  # Use Apache2 image
        ports:
        - containerPort: 80  # Apache defaults to port 80

        volumeMounts:
        - name: config
          mountPath: /usr/share/nginx/html/config.json
          subPath: config.json
      volumes:
      - name: config
        configMap:
          name: iam-fe-config