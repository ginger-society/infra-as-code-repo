apiVersion: apps/v1
kind: Deployment
metadata:
  name: iamadminservice
  labels:
    app: iamadminservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iamadminservice
  template:
    metadata:
      labels:
        app: iamadminservice
    spec:
      initContainers:
        - name: wait-for-db
          image: postgres:latest
          command:
            - sh
            - -c
            - |
              until pg_isready -h pg-postgresql -p 5432 -U postgres; do 
                echo "Waiting for DB..."
                sleep 5
              done

      containers:
        - name: iamadminservice
          image: gingersociety/iam-admin-service-api-stage:latest
          ports:
            - containerPort: 8000

          env:
            # ✅ DB URL from secret
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: iamadminservice-secrets
                  key: DATABASE_URL

            # ✅ Redis
            - name: REDIS_URI
              value: "redis://redis-service:6379"

            # ✅ App secrets
            - name: ISC_SECRET
              valueFrom:
                secretKeyRef:
                  name: iamadminservice-secrets
                  key: ISC_SECRET

            - name: ROCKET_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: iamadminservice-secrets
                  key: ROCKET_SECRET_KEY

            # ✅ Global secret
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: JWT_SECRET

            # ✅ Static config
            - name: ROCKET_ADDRESS
              value: "0.0.0.0"

            - name: ROCKET_PORT
              value: "8000"