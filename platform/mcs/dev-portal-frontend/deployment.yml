apiVersion: apps/v1
kind: Deployment
metadata:
  name: dev-portal
  labels:
    app: dev-portal
spec:
  selector:
    matchLabels:
      app: dev-portal
  replicas: 1
  template:
    metadata:
      labels:
        app: dev-portal
    spec:
      containers:
      - name: dev-portal
        image: gingersociety/dev-portal-prod-fe  # Use Apache2 image
        imagePullPolicy: Always
        ports:
        - containerPort: 80  # Apache defaults to port 80

        volumeMounts:
        - name: config
          mountPath: /usr/share/nginx/html/config.json
          subPath: config.json
      volumes:
      - name: config
        configMap:
          name: dev-portal-config