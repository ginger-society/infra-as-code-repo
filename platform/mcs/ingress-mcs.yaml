apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mcs-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/enable-websocket: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
spec:
  ingressClassName: nginx
  rules:
    - host: api.{{HOSTING_FQDN}}
      http:
        paths:
          - path: /example
            pathType: Prefix
            backend:
              service:
                name: example-service
                port:
                  number: 80

          - path: /iam
            pathType: Prefix
            backend:
              service:
                name: iam-service-api-service
                port:
                  number: 80

          - path: /metadata
            pathType: Prefix
            backend:
              service:
                name: metadata-service-api-service
                port:
                  number: 80
          
          - path: /kube
            pathType: Prefix
            backend:
              service:
                name: ginger-kube-service
                port:
                  number: 80

          - path: /iam-admin
            pathType: Prefix
            backend:
              service:
                name: iam-admin-service-api-service
                port:
                  number: 80

          - path: /notification
            pathType: Prefix
            backend:
              service:
                name: notification-service-service
                port:
                  number: 80

    - host: iam.{{HOSTING_FQDN}}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: iam-frontend-service
                port:
                  number: 80

    - host: iam-admin.{{HOSTING_FQDN}}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: iam-admin-frontend-service
                port:
                  number: 80

    - host: pgadmin.{{HOSTING_FQDN}}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pgadmin-pgadmin4
                port:
                  number: 80

    - host: k8-prod-dashboard.{{HOSTING_FQDN}}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dashboard-auth-proxy
                port:
                  number: 80

    - host: db-compose-test-env.{{HOSTING_FQDN}}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ginger-db-test-env-service
                port:
                  number: 80

    - host: coder-test-env.{{HOSTING_FQDN}}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: coder-test-service
                port:
                  number: 80

    - host: dev-portal.{{HOSTING_FQDN}}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dev-portal-frontend-service
                port:
                  number: 80