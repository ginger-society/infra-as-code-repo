apiVersion: apps/v1
kind: Deployment
metadata:
  name: iamservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iamservice
  template:
    metadata:
      labels:
        app: iamservice
    spec:

      initContainers:
        - name: wait-for-db
          image: postgres:latest
          command:
            - sh
            - -c
            - |
              until pg_isready -h pg-postgresql -p 5432 -U postgres; do 
                echo "Waiting for DB..."
                sleep 5
              done

      containers:
        - name: iamservice
          image: gingersociety/iam-service-api-stage:latest
          ports:
            - containerPort: 8000

          volumeMounts:
            - name: ssh-ca-key
              mountPath: /etc/ssh-ca
              readOnly: true

          env:
            # ✅ Build DATABASE_URL dynamically
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: iam-service-api-secrets
                  key: DATABASE_URL


            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pg-postgresql
                  key: postgres-password

            # Redis stays simple
            - name: REDIS_URI
              value: "redis://redis-service:6379"

            # ✅ Platform secret
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: JWT_SECRET

            # ✅ App-specific secrets
            - name: ISC_SECRET
              valueFrom:
                secretKeyRef:
                  name: iam-service-api-secrets
                  key: ISC_SECRET

            - name: ROCKET_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: iam-service-api-secrets
                  key: ROCKET_SECRET_KEY

            # Static config
            - name: ROCKET_ADDRESS
              value: "0.0.0.0"

            - name: ROCKET_PORT
              value: "8000"
            
            - name: DOCKER_REGISTRY_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: iam-service-api-secrets
                  key: DOCKER_REGISTRY_PRIVATE_KEY

            - name: DOCKER_TOKEN_ISSUER
              valueFrom:
                secretKeyRef:
                  name: iam-service-api-secrets
                  key: DOCKER_TOKEN_ISSUER
      volumes:
        - name: ssh-ca-key
          secret:
            secretName: iam-git-ssh-ca-secret
            defaultMode: 0400