# deployment.yml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gingerkubeservice
  labels:
    app: gingerkubeservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gingerkubeservice
  template:
    metadata:
      labels:
        app: gingerkubeservice
    spec:
      # serviceAccountName: gingerkubeservice-sa
      containers:
      - name: gingerkubeservice
        image: gingersociety/ginger-kube-service-api-stage:latest
        ports:
        - containerPort: 8000
        env:
          - name: DATABASE_URL
            valueFrom:
              secretKeyRef:
                name: ginger-kube-api-secrets
                key: DATABASE_URL
          - name: REDIS_URI
            value: "redis://redis-service:6379"
          - name: ROCKET_ADDRESS
            value: "0.0.0.0"
          - name: ROCKET_PORT
            value: "8000"
          # ✅ App secrets
          - name: ISC_SECRET
            valueFrom:
              secretKeyRef:
                name: ginger-kube-api-secrets
                key: ISC_SECRET

          - name: ROCKET_SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: ginger-kube-api-secrets
                key: ROCKET_SECRET_KEY

            # ✅ Global secret
          - name: JWT_SECRET
            valueFrom:
              secretKeyRef:
                name: platform-secrets
                key: JWT_SECRET
