apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 30s
      evaluation_interval: 30s

    scrape_configs:
      - job_name: 'mcs-cadvisor'
        scheme: https
        metrics_path: /cadvisor/metrics
        static_configs:
          - targets: ['mcs.{{PROMETHEUS.CLOUD_PROVIDER_FQDN}}']
            labels:
              host: mcs

      - job_name: 'mcs-node'
        scheme: https
        metrics_path: /node/metrics
        static_configs:
          - targets: ['mcs.{{PROMETHEUS.CLOUD_PROVIDER_FQDN}}']
            labels:
              host: mcs

      - job_name: 'artifactory-cadvisor'
        scheme: https
        metrics_path: /cadvisor/metrics
        static_configs:
          - targets: ['artifactory.{{PROMETHEUS.CLOUD_PROVIDER_FQDN}}']
            labels:
              host: artifactory

      - job_name: 'artifactory-node'
        scheme: https
        metrics_path: /node/metrics
        static_configs:
          - targets: ['artifactory.{{PROMETHEUS.CLOUD_PROVIDER_FQDN}}']
            labels:
              host: artifactory

      - job_name: 'dc0102-cadvisor'
        scheme: https
        metrics_path: /cadvisor/metrics
        static_configs:
          - targets: ['dc0102.{{PROMETHEUS.CLOUD_PROVIDER_FQDN}}']
            labels:
              host: dc0102

      - job_name: 'dc0102-node'
        scheme: https
        metrics_path: /node/metrics
        static_configs:
          - targets: ['dc0102.{{PROMETHEUS.CLOUD_PROVIDER_FQDN}}']
            labels:
              host: dc0102