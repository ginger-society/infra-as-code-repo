<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName api.gingersociety.org

    ProxyPreserveHost On

    # Setup the proxy
    <Proxy *>
        Require all granted
    </Proxy>

    # Standard HTTP Proxy
    ProxyPass "/" "http://0.0.0.0:8081/"
    ProxyPassReverse "/" "http://0.0.0.0:8081/"

   # WebSocket Proxy
    ProxyPass /notification/ws/ ws://0.0.0.0:8081/notification/ws/
    ProxyPassReverse /notification/ws/ ws://0.0.0.0:8081/notification/ws/

    # Enable WebSocket Upgrade Handling
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/notification/ws/(.*) ws://0.0.0.0:8081/notification/ws/$1 [P,L]


    ErrorLog ${APACHE_LOG_DIR}/gingersociety/api_error.log
    CustomLog ${APACHE_LOG_DIR}/gingersociety/api_access.log combined

    SSLCertificateFile /etc/letsencrypt/live/api.gingersociety.org/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/api.gingersociety.org/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>


