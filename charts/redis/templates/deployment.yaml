apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "redis.fullname" . }}
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "redis.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "redis.name" . }}
    spec:
      # Pod-level securityContext required by the PodSecurity "restricted"
      # admission policy enforced on tekton-pipelines — runAsNonRoot and a
      # seccompProfile must be set at the pod level (or repeated on every
      # container; setting once here covers both containers below).
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          ports:
            - containerPort: {{ .Values.redis.service.redisPort }}
          args:
            - "--requirepass"
            - "$(REDIS_PASSWORD)"
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "redis.fullname" . }}-auth
                  key: password
          # Container-level requirements the restricted profile checks
          # independently of the pod-level settings above:
          # allowPrivilegeEscalation must be false, and all capabilities
          # must be dropped.
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

        - name: redis-exporter
          image: oliver006/redis_exporter:latest
          ports:
            - containerPort: {{ .Values.redis.service.metricsPort }}
          env:
            - name: REDIS_ADDR
              valueFrom:
                secretKeyRef:
                  name: {{ include "redis.fullname" . }}-auth
                  key: exporter_url
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]